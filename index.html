<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go API - Product CRUD & Cache Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100 min-h-screen p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">📦 Product CRUD & Redis Cache Demo</h1>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-1">
                <h2 id="form-title" class="text-xl font-semibold mb-4 text-gray-700">Add New Product</h2>
                <form id="product-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Product ID</label>
                        <input type="text" id="prod-id"
                            class="mt-1 block w-full rounded-md border border-gray-300 p-2 text-sm focus:outline-blue-500"
                            placeholder="e.g. P001" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Product Name</label>
                        <input type="text" id="prod-name"
                            class="mt-1 block w-full rounded-md border border-gray-300 p-2 text-sm focus:outline-blue-500"
                            placeholder="e.g. Keyboard" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600">Price</label>
                        <input type="number" step="0.01" id="prod-price"
                            class="mt-1 block w-full rounded-md border border-gray-300 p-2 text-sm focus:outline-blue-500"
                            placeholder="0.00" required>
                    </div>
                    <button type="submit" id="submit-btn"
                        class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 font-medium text-sm transition">Save
                        Product</button>
                    <button type="button" id="cancel-edit-btn"
                        class="w-full bg-gray-400 text-white p-2 rounded-md hover:bg-gray-500 font-medium text-sm transition hidden">Cancel
                        Edit</button>
                </form>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md md:col-span-2 flex flex-col justify-between">
                <div>
                    <h2 class="text-xl font-semibold mb-4 text-gray-700">🔍 Live Cache Tester (Get Product)</h2>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="search-id"
                            class="flex-1 rounded-md border border-gray-300 p-2 text-sm focus:outline-blue-500"
                            placeholder="Enter Product ID to test cache...">
                        <button onclick="fetchProductWithCache()"
                            class="bg-emerald-600 text-white px-4 py-2 rounded-md hover:bg-emerald-700 text-sm font-medium transition">Fetch
                            & Check</button>
                    </div>

                    <div id="source-badge" class="hidden p-3 rounded-lg text-center font-bold text-sm mb-4"></div>

                    <pre id="json-output"
                        class="bg-gray-900 text-green-400 p-4 rounded-lg text-xs overflow-x-auto min-h-[120px]">Waiting for action...</pre>
                </div>
                <p class="text-xs text-gray-400 mt-4">* เมื่อกด Fetch ซ้ำตัวเดิมภายใน 60 วิ ข้อมูลจะถูกดึงจาก Redis
                    แคชทันที ทำให้ระบบไม่จำเป็นต้องโหลดจากฐานข้อมูลหลัก</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.origin;

        const form = document.getElementById('product-form');
        const prodIdInput = document.getElementById('prod-id');
        const prodNameInput = document.getElementById('prod-name');
        const prodPriceInput = document.getElementById('prod-price');
        const submitBtn = document.getElementById('submit-btn');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const formTitle = document.getElementById('form-title');

        let isEditMode = false;

        // สั่งจัดการเมื่อกด Submit Form (สร้าง หรือ อัปเดต)
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const payload = {
                id: prodIdInput.value,
                name: prodNameInput.value,
                price: parseFloat(prodPriceInput.value)
            };

            const url = isEditMode ? `${API_BASE_URL}/products/${payload.id}` : `${API_BASE_URL}/products`;
            const method = isEditMode ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                alert(data.message || 'Success!');
                resetForm();
                // อัปเดตกล่องโชว์สถานะล่าสุด
                document.getElementById('json-output').textContent = JSON.stringify(data, null, 2);
                document.getElementById('source-badge').className = 'hidden';
            } catch (err) {
                alert('Error connecting to API');
            }
        });

        // ฟังก์ชันพิเศษ: ดึงข้อมูลสินค้าพร้อมตรวจสอบแหล่งที่มา (Redis vs Postgres)
        async function fetchProductWithCache() {
            const id = document.getElementById('search-id').value.trim();
            if (!id) return alert('Please enter a product ID');

            const badge = document.getElementById('source-badge');
            const output = document.getElementById('json-output');

            try {
                const startTime = performance.now();
                const res = await fetch(`${API_BASE_URL}/products/${id}`);
                const duration = (performance.now() - startTime).toFixed(1);

                if (res.status === 404) {
                    badge.className = 'p-3 rounded-lg text-center font-bold text-sm mb-4 bg-red-100 text-red-800';
                    badge.innerHTML = `❌ Product Not Found`;
                    output.textContent = 'Not found in Database';
                    return;
                }

                const result = await res.json();
                output.textContent = JSON.stringify(result, null, 2);

                // ตรวจสอบแหล่งที่มาเพื่อเปลี่ยนสีกล่องแจ้งเตือน
                if (result.source === 'redis_cache') {
                    badge.className = 'p-3 rounded-lg text-center font-bold text-sm mb-4 bg-purple-100 text-purple-800 border border-purple-300 animate-pulse';
                    badge.innerHTML = `⚡ HIT REDIS CACHE! (Response Time: ${duration}ms)`;
                } else {
                    badge.className = 'p-3 rounded-lg text-center font-bold text-sm mb-4 bg-amber-100 text-amber-800 border border-amber-300';
                    badge.innerHTML = `🗄️ MISS CACHE -> READ POSTGRESQL (Response Time: ${duration}ms)`;
                }

            } catch (err) {
                alert('Error fetching data');
            }
        }

        // ฟังก์ชันเปลี่ยนหน้าเว็บเป็นโหมดแก้ไขข้อมูล
        function switchToEdit(id, name, price) {
            isEditMode = true;
            formTitle.textContent = 'Edit Product';
            prodIdInput.value = id;
            prodIdInput.disabled = true; // ห้ามแก้ ID หลัก
            prodNameInput.value = name;
            prodPriceInput.value = price;
            submitBtn.textContent = 'Update Product';
            submitBtn.className = 'w-full bg-amber-600 text-white p-2 rounded-md hover:bg-amber-700 font-medium text-sm transition';
            cancelEditBtn.classList.remove('hidden');
        }

        function resetForm() {
            isEditMode = false;
            formTitle.textContent = 'Add New Product';
            form.reset();
            prodIdInput.disabled = false;
            submitBtn.textContent = 'Save Product';
            submitBtn.className = 'w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 font-medium text-sm transition';
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.addEventListener('click', resetForm);
    </script>
</body>

</html>
